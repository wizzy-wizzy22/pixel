<!DOCTYPE html>

<head>
    <title>PIXEL</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="background-color: rgb(121, 121, 121);">

    <div class="field-container">
        <div class="color-palette">
            <div class="color-cell black selected"></div>
            <div class="color-cell red"></div>
            <div class="color-cell green"></div>
            <div class="color-cell blue"></div>
            <div class="color-cell yellow"></div>
            <div class="color-cell skyblue"></div>
            <div class="tool-cell eraser"> <img class="eraser"
                    src="https://cdn0.iconfinder.com/data/icons/graphic-design-tools-6/128/_eraser-512.png"
                    alt="eraser"> </div>
            <div class="tool-cell fill-tool"> <img class="fill-tool"
                    src="https://iconsvg.co/icon/08dbb3cd-8bac-48b3-8eb8-5d0a7756a35d.svg" alt="bucket"> </div>
        </div>
        <div class="field"></div>
    </div>
    <script src="pixel_art.js"></script>
</body>

</html>


<style>
    .field-container {

        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px
    }

    .field {
        width: 73vh;
        height: 25vw;
        display: grid;
        grid-template-columns: repeat(30, 1fr);
        grid-template-rows: repeat(15, 1fr);
      
    }

    .tool-cell {

        width: 20px;
        height: 20px;
        border: 1px solid black;
    }

    .black {

        background-color: rgb(0, 0, 0);
        border: 1px solid black;
        width: 20px;
        height: 20px;
    }


    .red {

        width: 20px;
        height: 20px;
        background-color: rgb(255, 102, 46);
        border: 1px solid black;
    }

    .green {

        background-color: rgb(26, 218, 84);
        border: 1px solid black;
        width: 20px;
        height: 20px;
    }

    .blue {

        background-color: rgb(19, 15, 255);
        border: 1px solid black;
        width: 20px;
        height: 20px;
    }

    .yellow {

        background-color: rgb(255, 236, 26);
        border: 1px solid black;
        width: 20px;
        height: 20px;
    }

    .skyblue {

        border: 1px solid black;
        background-color: rgb(142, 229, 255);
        width: 20px;
        height: 20px;
    }

    .eraser {

        width: 20px;
        height: 20px;
        border: 1px solid black;
    }

    .fill-tool{

        width: 20px;
        height: 20px;
        border: 1px solid black;
    }

    .cell{

        background-color: white;
        border:1px solid black;
    }
    
</style>
